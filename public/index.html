<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FoodLand.fyi — Food &amp; Nutrition Database</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GSLR2L7H51"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-GSLR2L7H51');
  </script>

  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <a href="/" class="brand">FoodLand.fyi</a>
    <span id="stats">loading…</span>
  </header>

  <main>
    <section class="search">
      <input id="q" type="search" placeholder="Search foods or scan a barcode — e.g. cheddar, banana, 884853601023…" autofocus />

      <div class="filters">
        <label>Source
          <select id="f-source">
            <option value="all">All</option>
            <option value="usda">USDA</option>
            <option value="off">Open Food Facts</option>
          </select>
        </label>
        <label data-when="not-off">USDA type
          <select id="f-usdatype">
            <option value="all">All</option>
            <option value="branded">Branded</option>
            <option value="whole">Whole foods</option>
          </select>
        </label>
        <label data-when="not-usda">Nutri-Score
          <select id="f-nutriscore">
            <option value="all">Any</option>
            <option value="a">A</option>
            <option value="b">B</option>
            <option value="c">C</option>
            <option value="d">D</option>
            <option value="e">E</option>
          </select>
        </label>
        <label>Sort
          <select id="f-sort">
            <option value="relevance">Relevance</option>
            <option value="name">Name</option>
            <option value="kcal_desc">Calories ↓</option>
            <option value="kcal_asc">Calories ↑</option>
            <option value="protein_desc">Protein ↓</option>
          </select>
        </label>
        <label class="chk"><input type="checkbox" id="f-hideempty" checked /> Hide entries with no nutrition</label>

        <details class="ranges">
          <summary>Nutrient ranges (per 100 g)</summary>
          <div class="range-grid">
            <span>Calories</span><input id="f-minkcal" type="number" min="0" placeholder="min" /><input id="f-maxkcal" type="number" min="0" placeholder="max" />
            <span>Protein (g)</span><input id="f-minprotein" type="number" min="0" placeholder="min" /><input id="f-maxprotein" type="number" min="0" placeholder="max" />
            <span>Sugar (g)</span><input id="f-minsugar" type="number" min="0" placeholder="min" /><input id="f-maxsugar" type="number" min="0" placeholder="max" />
            <span>Fat (g)</span><input id="f-minfat" type="number" min="0" placeholder="min" /><input id="f-maxfat" type="number" min="0" placeholder="max" />
          </div>
        </details>
      </div>

      <div id="results" class="results"></div>
    </section>

    <section id="label-panel" class="label-panel" hidden>
      <div id="label"></div>
    </section>
  </main>

  <footer>
    <p class="meta">
      Data: <a href="https://fdc.nal.usda.gov/">USDA FoodData Central</a> (public domain) &amp;
      <a href="https://world.openfoodfacts.org/">Open Food Facts</a> (ODbL).
      %DV based on a 2,000 calorie diet.
    </p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
